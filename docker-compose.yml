services:
  influxdb:
    image: influxdb:1.8
    container_name: influxdb1
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB}
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - influxdb
    restart: unless-stopped

  shelly_reader:
    build: .
    container_name: shelly_reader
    environment:
      PYTHONUNBUFFERED: "1"

      POLL_INTERVAL: ${POLL_INTERVAL}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT}
      SHELLY_USERNAME: ${SHELLY_USERNAME}
      SHELLY_PASSWORD: ${SHELLY_PASSWORD}
      SHELLY_DEVICES: ${SHELLY_DEVICES}
      SHELLY_DEVICES_JSON: ${SHELLY_DEVICES_JSON}

      INFLUX_HOST: influxdb
      INFLUX_PORT: "8086"
      INFLUX_DB: ${INFLUXDB_DB}
      INFLUX_USER: ${INFLUXDB_ADMIN_USER}
      INFLUX_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT}
    depends_on:
      - influxdb
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
